version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdil
      POSTGRES_PASSWORD: sdilpass
      POSTGRES_DB: enterprise_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./demo_data/seed_kaggle.sql:/docker-entrypoint-initdb.d/01_seed.sql
      - ./demo_data/kaggle:/data/kaggle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdil -d enterprise_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
